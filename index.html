cat <<EOF > index.html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingFood | المذاق الملكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --dark: #121212; }
        body { background: var(--dark); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        header { padding: 20px; border-bottom: 2px solid var(--gold); background: #000; }
        .hero { padding: 50px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=800&q=80'); background-size: cover; }
        .card { background: #1e1e1e; margin: 20px; padding: 20px; border-radius: 10px; border-right: 5px solid var(--gold); text-align: right; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid var(--gold); background: #222; color: white; }
        button { background: var(--gold); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1 style="color:var(--gold);">KingFood</h1></header>
    <div class="hero">
        <h2 style="color:var(--gold);">ذوق ملكي في تيزي وزو</h2>
        <p>شارع عبسات إيدير - فخامة الطعام</p>
    </div>
    <div class="card">
        <h3>حجز طاولة</h3>
        <input type="text" placeholder="الاسم الكامل">
        <input type="tel" placeholder="رقم الهاتف">
        <input type="date">
        <button>تأكيد الحجز</button>
    </div>
    <div class="card">
        <h3>معلومات الاتصال</h3>
        <p>📍 الموقع: وسط مدينة تيزي وزو</p>
        <p>📞 الهاتف: 0550-00-00-00</p>
        <p>📧 الإيميل: contact@kingfood.dz</p>
    </div>
    <footer style="padding: 20px; color: #666;">© 2026 KingFood</footer>
</body>
</html>
EOF
