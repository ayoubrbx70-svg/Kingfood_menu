<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingFood | تجربة ملكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap');

        :root { --gold: #c5a059; --dark: #0a0a0a; --white: #ffffff; }
        
        body { margin: 0; background: var(--dark); color: var(--white); font-family: 'Cairo', sans-serif; }

        /* قسم الواجهة الكبيرة - Hero Section */
        .hero { 
            height: 80vh; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1514355315815-2b64b0216b14?q=80&w=2070'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .hero h1 { font-size: 3.5rem; color: var(--gold); margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero p { font-size: 1.2rem; margin-top: 10px; letter-spacing: 2px; }

        /* قسم الحجز الاحترافي */
        .booking-section { padding: 80px 20px; background: #0f0f0f; display: flex; justify-content: center; }
        .booking-container { background: #151515; padding: 40px; border-radius: 2px; border: 1px solid #222; width: 100%; max-width: 500px; position: relative; }
        .booking-container h2 { text-align: center; color: var(--gold); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 3px; }

        input, select { 
            width: 100%; padding: 15px; margin-bottom: 15px; background: transparent; 
            border: 1px solid #333; color: white; border-radius: 0; font-size: 1rem; box-sizing: border-box;
        }
        input:focus { border-color: var(--gold); outline: none; }

        #submitBtn { 
            width: 100%; padding: 15px; background: var(--gold); color: black; 
            border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; 
            transition: 0.4s; text-transform: uppercase;
        }
        #submitBtn:hover { background: #e0b46a; letter-spacing: 1px; }

        /* قائمة الطعام - Grid Layout */
        .menu-section { padding: 80px 20px; }
        .menu-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; max-width: 1200px; margin: auto; 
        }
        .menu-item { background: #111; overflow: hidden; border-bottom: 3px solid transparent; transition: 0.3s; }
        .menu-item:hover { border-color: var(--gold); transform: translateY(-10px); }
        .menu-item img { width: 100%; height: 250px; object-fit: cover; filter: grayscale(30%); transition: 0.5s; }
        .menu-item:hover img { filter: grayscale(0%); }
        .menu-info { padding: 20px; text-align: center; }
        .menu-info h3 { color: var(--gold); margin: 0; font-size: 1.4rem; }

        /* رسالة النجاح */
        #successOverlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #151515; flex-direction: column; justify-content: center; align-items: center; z-index: 10; 
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>KING FOOD</h1>
        <p>فخامة المذاق في قلب تيزي وزو</p>
    </section>

    <section class="menu-section">
        <h2 style="text-align:center; color:var(--gold); margin-bottom:50px;">أطباقنا الفاخرة</h2>
        <div class="menu-grid">
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=500">
                <div class="menu-info"><h3>البرغر الملكي</h3><p>لحم مشوي على اللهب بخلطة سرية</p></div>
            </div>
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=500">
                <div class="menu-info"><h3>بيتزا كينج</h3><p>أجود أنواع الجبن الإيطالي الفاخر</p></div>
            </div>
            <div class="menu-item">
                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=500">
                <div class="menu-info"><h3>ستيك المشاهير</h3><p>قطع لحم منتقاة بعناية فائقة</p></div>
            </div>
        </div>
    </section>

    <section class="booking-section">
        <div class="booking-container">
            <h2>احجز طاولتك</h2>
            <form id="resForm" action="https://formspree.io/f/xaqvggzy" method="POST">
                <input type="text" name="الاسم" placeholder="الاسم الكامل" required>
                <input type="number" name="عدد_الأشخاص" placeholder="عدد الضيوف" required>
                <input type="date" name="التاريخ" required>
                <select name="التوقيت">
                    <option value="مساءً">وقت العشاء</option>
                    <option value="ظهراً">وقت الغداء</option>
                </select>
                <button type="submit" id="submitBtn">احجز الآن</button>
            </form>
            <div id="successOverlay">
                <i class="fas fa-check-circle" style="font-size: 50px; color: var(--gold); margin-bottom: 20px;"></i>
                <h2 style="margin:0;">تم الحجز</h2>
                <p>سنكون بانتظاركم بكل فخر</p>
            </div>
        </div>
    </section>

    <footer style="background:#000; padding:50px; text-align:center; border-top:1px solid #222;">
        <p style="color:var(--gold);">&copy; 2026 KING FOOD - TIZI OUZOU</p>
    </footer >

    <script>
        const form = document.getElementById('resForm');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = "جاري الحجز...";
            btn.disabled = true;
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    document.getElementById('successOverlay').style.display = 'flex';
                }
            } catch (error) {
                alert("خطأ في الاتصال");
                btn.disabled = false;
                btn.innerHTML = "احجز الآن";
            }
        };
    </script>
</body>
</html>
