<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingFood | المذاق الملكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #121212; --card: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .hero { background: linear-gradient(45deg, #1a1a1a, #000); padding: 40px 20px; text-align: center; border-bottom: 1px solid #333; }
        .hero h1 { color: var(--gold); font-size: 2.2rem; margin: 0; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h2 { color: var(--gold); font-size: 1.4rem; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        .btn-whatsapp { background: #25d366; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: bold; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .info-item { display: flex; align-items: center; gap: 12px; margin: 12px 0; font-size: 1rem; }
        .info-item i { color: var(--gold); }
        footer { text-align: center; padding: 20px; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1 style="color:var(--gold); margin:0; font-size:1.8rem;">KING FOOD</h1>
</header>

<section class="hero">
    <h1>المذاق الملكي</h1>
    <p>تيزي وزو - شارع عبسات إيدير</p>
</section>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-calendar-alt"></i> حجز طاولة</h2>
        <form id="resForm">
            <input type="text" id="custName" placeholder="الاسم الكامل" required>
            <input type="number" id="custPeople" placeholder="عدد الأشخاص" required>
            <input type="date" id="resDate" required>
            <select id="resTime">
                <option>وقت الغداء</option>
                <option>وقت العشاء</option>
            </select>
            <button type="button" onclick="goWhatsapp()" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> إرسال الحجز للواتساب
            </button>
        </form>
    </div>

    <div class="card">
        <h2><i class="fas fa-info-circle"></i> اتصل بنا</h2>
        <div class="info-item"><i class="fas fa-map-marker-alt"></i> وسط مدينة تيزي وزو</div>
        <div class="info-item"><i class="fas fa-phone"></i> 0660 56 08 81</div>
        <div class="info-item"><i class="fas fa-clock"></i> مفتوح من 11:00 إلى 23:00</div>
    </div>
</div>

<footer>&copy; 2026 KingFood - جميع الحقوق محفوظة</footer>

<script>
    function goWhatsapp() {
        let n = document.getElementById('custName').value;
        let p = document.getElementById('custPeople').value;
        let d = document.getElementById('resDate').value;
        let t = document.getElementById('resTime').value;
        
        if(!n || !p || !d) { alert("أدخل معلومات الحجز أولاً"); return; }

        let msg = `طلب حجز جديد من الموقع:%0Aالاسم: ${n}%0Aالعدد: ${p}%0Aالتاريخ: ${d}%0Aالتوقيت: ${t}`;
        // تم وضع رقمك الجديد 0660560881 بصيغة دولية
        let phone = "213660560881"; 
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
