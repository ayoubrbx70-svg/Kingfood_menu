<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingFood | المذاق الملكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #121212; --card: #1e1e1e; --green: #2ecc71; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        header { padding: 30px; border-bottom: 2px solid var(--gold); background: #000; }
        .gold-text { color: var(--gold); }
        .container { max-width: 450px; margin: auto; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; font-size: 16px; }
        #submitBtn { background: var(--gold); color: black; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        /* واجهة النجاح */
        #successOverlay { display: none; background: var(--card); position: absolute; top: 0; left: 0; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .check-icon { font-size: 60px; color: var(--green); margin-bottom: 15px; }
        
        .menu-img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1 class="gold-text">KING FOOD</h1>
    <p>المذاق الملكي - تيزي وزو</p>
</header>

<div class="container">
    <div class="card">
        <h3 class="gold-text"><i class="fas fa-utensils"></i> حجز طاولة</h3>
        
        <form id="resForm" action="https://formspree.io/f/xaqvggzy" method="POST">
            <input type="text" name="الاسم" placeholder="الاسم الكامل" required>
            <input type="number" name="عدد_الأشخاص" placeholder="عدد الأشخاص" required>
            <input type="date" name="التاريخ" required>
            <select name="التوقيت">
                <option value="الغداء">وقت الغداء</option>
                <option value="العشاء">وقت العشاء</option>
            </select>
            <button type="submit" id="submitBtn">احجز</button>
        </form>

        <div id="successOverlay">
            <i class="fas fa-check-circle check-icon"></i>
            <h2 style="color: white;">تم الحجز بنجاح</h2>
            <p style="color: #aaa;">شكراً لثقتكم بـ KingFood</p>
        </div>
    </div>

    <h2 class="gold-text" style="margin-top: 40px;">أطباقنا المميزة</h2>
    <div class="card" style="margin-bottom: 20px;">
        <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=500" class="menu-img">
        <h4 class="gold-text">برغر ملكي</h4>
    </div>
    <div class="card">
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" class="menu-img">
        <h4 class="gold-text">بيتزا كينج</h4>
    </div>
</div>

<footer style="padding: 30px; color: #555;">&copy; 2026 KingFood Tizi Ouzou</footer>

<script>
    const form = document.getElementById('resForm');
    const successOverlay = document.getElementById('successOverlay');

    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = "جاري الحجز...";
        btn.disabled = true;

        const formData = new FormData(form);
        
        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                successOverlay.style.display = 'flex';
                form.reset();
            } else {
                alert("حدث خطأ، حاول مجدداً");
                btn.disabled = false;
                btn.innerHTML = "احجز";
            }
        } catch (error) {
            alert("فشل الاتصال");
            btn.disabled = false;
            btn.innerHTML = "احجز";
        }
    };
</script>

</body>
</html>
